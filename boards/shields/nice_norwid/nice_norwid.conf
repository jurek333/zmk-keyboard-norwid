# Enable nice!view
CONFIG_ZMK_DISPLAY=y
# Disable idle blanking
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=n

CONFIG_LS0XX=y

# LVGL – required for the MJ text widget
CONFIG_LVGL=y

# Montserrat 48 pt font (used by the MJ widget)
# Change to CONFIG_LV_FONT_MONTSERRAT_32=y if 48pt is too large for your panel
CONFIG_LV_FONT_MONTSERRAT_24=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_24=y

# MJ widget
CONFIG_ZMK_WIDGET_MJ=y
